<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rowspan table</title>
</head>
<body>
    <table border="1">
        <tr>
            <th rowspan="2">Monday</th>
            <td>1</td>
            <td>2</td>
        </tr>
        <tr>
           <td>3</td>
            <td>4</td>
        </tr>

        <tr>
            <th rowspan="4">Tuesday</th>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
        </tr>

        <tr>
            <td>9</td>
            <td>10</td>
        </tr>
           <tr>
            <td>11</td>
            <td>12</td>
        </tr>
    </table>
</body>
</html>
